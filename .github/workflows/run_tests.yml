name: CI - Testes e Qualidade de Dados

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  validar-estrutura:
    name: Validar Estrutura do Projeto
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas pyarrow duckdb faker pytest

      - name: Verificar arquivos essenciais
        run: |
          test -f pipelines/adf/01_ingest_bronze.py      && echo OK Bronze
          test -f pipelines/databricks/01_bronze_to_silver.py && echo OK Silver
          test -f pipelines/databricks/02_silver_to_gold.py   && echo OK Gold
          test -f streaming/event_hub_producer.py         && echo OK Producer
          test -f streaming/event_hub_consumer.py         && echo OK Consumer
          test -f docker-compose.yml                      && echo OK Docker
          test -f sql/ddl/01_create_tables.sql            && echo OK DDL

      - name: Verificar sintaxe Python
        run: |
          python -m py_compile pipelines/adf/01_ingest_bronze.py
          python -m py_compile pipelines/databricks/01_bronze_to_silver.py
          python -m py_compile pipelines/databricks/02_silver_to_gold.py
          python -m py_compile streaming/event_hub_producer.py
          python -m py_compile streaming/event_hub_consumer.py
          echo Sintaxe OK!

      - name: Rodar testes unitarios (sem banco)
        run: pytest tests/test_transformations.py -v --tb=short
