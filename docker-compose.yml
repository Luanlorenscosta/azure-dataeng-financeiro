version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: financeiro-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: financeiro_source
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financeiro-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: financeiro-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - financeiro-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: financeiro-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - financeiro-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: financeiro-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: financeiro
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - financeiro-net

volumes:
  postgres_data:

networks:
  financeiro-net:
    driver: bridge
